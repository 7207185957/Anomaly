apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aiops.fullname" . }}-backend-config
data:
{{- range $k, $v := .Values.backend.env }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiops.fullname" . }}-backend-secret
type: Opaque
stringData:
  JWT_SECRET_KEY: {{ .Values.backend.secretEnv.JWT_SECRET_KEY | quote }}
  PG_PASSWORD: {{ .Values.backend.secretEnv.PG_PASSWORD | quote }}
  LDAP_BIND_PASSWORD: {{ .Values.backend.secretEnv.LDAP_BIND_PASSWORD | quote }}
  MLFLOW_TRACKING_PASSWORD: {{ .Values.backend.secretEnv.MLFLOW_TRACKING_PASSWORD | quote }}

